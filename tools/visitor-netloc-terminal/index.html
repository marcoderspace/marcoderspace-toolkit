<div id="cli-dual-wrap">
  <div id="visitor-cli-wrap">
    <div id="visitor-cli"></div>
  </div>

  <div id="netloc-cli-wrap">
    <div id="netloc-cli"></div>
  </div>
</div>

<style>
#cli-dual-wrap{
  width:100%;
  height:100%;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  background:transparent;
}

#visitor-cli-wrap,
#netloc-cli-wrap{
  width:100%;
  height:100%;
  min-height:160px;
  overflow:hidden;
  background:transparent;
}

#visitor-cli,
#netloc-cli{
  width:100%;
  height:100%;
  box-sizing:border-box;
  overflow:hidden;

  font-family:"Courier New", Courier, monospace;
  color:#00ff00;
  background:transparent;
  white-space:pre-wrap;
  line-height:1.35;
  letter-spacing:0.02em;
  text-shadow:0 0 6px rgba(0,255,0,0.5);
  word-break:break-word;
  overflow-wrap:anywhere;
}

@media (max-width:768px){
  #cli-dual-wrap{
    grid-template-columns:1fr;
  }

  #visitor-cli-wrap,
  #netloc-cli-wrap{
    min-height:140px;
  }
}
</style>

<script>
(async function(){

  const dualWrap    = document.getElementById("cli-dual-wrap");
  const visitorWrap = document.getElementById("visitor-cli-wrap");
  const visitorOut  = document.getElementById("visitor-cli");
  const netlocWrap  = document.getElementById("netloc-cli-wrap");
  const netlocOut   = document.getElementById("netloc-cli");

  let fitScheduled = false;
  let lastAppliedSize = null;

  function print(el, t){
    el.textContent += t + "\n";
  }

  function nowUTC(){
    return new Date().toISOString().replace("T"," ").replace("Z"," UTC");
  }

  function localTime(){
    return new Date().toLocaleString();
  }

  function getBestFontSize(wrap, out){
    if (!wrap || !out) return 6;

    let low = 6;
    let high = 40;
    let best = 6;

    while (low <= high) {
      const mid = Math.floor((low + high) / 2);
      out.style.fontSize = mid + "px";

      if (out.scrollWidth <= wrap.clientWidth && out.scrollHeight <= wrap.clientHeight) {
        best = mid;
        low = mid + 1;
      } else {
        high = mid - 1;
      }
    }

    return best;
  }

  function fitAllSameFontNow(){
    const visitorSize = getBestFontSize(visitorWrap, visitorOut);
    const netlocSize  = getBestFontSize(netlocWrap, netlocOut);
    const sharedSize  = Math.min(visitorSize, netlocSize);

    if (lastAppliedSize !== sharedSize) {
      visitorOut.style.fontSize = sharedSize + "px";
      netlocOut.style.fontSize  = sharedSize + "px";
      lastAppliedSize = sharedSize;
    }
  }

  function scheduleFit(){
    if (fitScheduled) return;
    fitScheduled = true;

    requestAnimationFrame(() => {
      fitScheduled = false;
      fitAllSameFontNow();
    });
  }

  print(visitorOut, "visitor terminal");
  print(visitorOut, "------------------------------");
  print(visitorOut, "");
  print(visitorOut, "screen  : " + window.screen.width + "x" + window.screen.height);
  print(visitorOut, "platform: " + navigator.platform);
  print(visitorOut, "agent   : " + navigator.userAgent);
  print(visitorOut, "local   : " + localTime());
  print(visitorOut, "utc     : " + nowUTC());

  async function getGeo(){
    try{
      const r = await fetch("https://ipapi.co/json/");
      const j = await r.json();
      if(j.country_name){
        return {
          ip:j.ip,
          country:j.country_name,
          region:j.region,
          city:j.city,
          source:"ipapi"
        };
      }
    }catch(e){}

    try{
      const r = await fetch("https://ipwho.is/");
      const j = await r.json();
      if(j.country){
        return {
          ip:j.ip,
          country:j.country,
          region:j.region,
          city:j.city,
          source:"ipwho"
        };
      }
    }catch(e){}

    try{
      const r = await fetch("https://ipinfo.io/json");
      const j = await r.json();
      if(j.country){
        return {
          ip:j.ip,
          country:j.country,
          region:j.region,
          city:j.city,
          source:"ipinfo"
        };
      }
    }catch(e){}

    return null;
  }

  print(netlocOut, "netloc terminal");
  print(netlocOut, "------------------------------");
  print(netlocOut, "");
  print(netlocOut, "resolving location...");
  print(netlocOut, "");

  const geo = await getGeo();

  netlocOut.textContent = "";
  print(netlocOut, "netloc terminal");
  print(netlocOut, "------------------------------");
  print(netlocOut, "");

  if(!geo){
    print(netlocOut, "geo lookup failed");
  } else {
    print(netlocOut, "ip     : " + geo.ip);
    print(netlocOut, "country: " + geo.country);
    print(netlocOut, "region : " + geo.region);
    print(netlocOut, "city   : " + geo.city);
    print(netlocOut, "source : " + geo.source);
  }

  scheduleFit();
  window.addEventListener("resize", scheduleFit);

  if (typeof ResizeObserver !== "undefined") {
    const ro = new ResizeObserver(() => scheduleFit());
    ro.observe(dualWrap);
  }

})();
</script>
